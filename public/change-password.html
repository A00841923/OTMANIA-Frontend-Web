<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | OTMania</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons (Bootstrap Icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/change-password.css">
</head>

<body>
    <!-- Top -->
    <div class="top-bar container">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Rockwell_Automation_logo_%282019%29.svg/1280px-Rockwell_Automation_logo_%282019%29.svg.png">
    </div>

    <div class="main-content d-flex flex-column justify-content-center align-items-center">

    <!-- Title -->
    <div class="subtitle mb-4">
        <h4>Change Password</h4>
        <p>Enter your email to reset your password</p>
    </div>

    <!-- CHANGE PASSWORD BOX -->
    <div class="col-11 col-sm-8 col-md-5 change-box text-center">

        <form id="resetForm">

            <!-- STEP 1: EMAIL -->
            <div id="step1">
                <input type="email" id="email" class="form-control mb-3" placeholder="Enter your email">

                <p id="emailError" class="error"></p>

                <button class="btn btn-custom w-100">Send Code</button>
            </div>

            <!-- STEP 2: CODE -->
            <div id="step2" class="hidden mt-3">
                <p class="text-muted small">
                    Enter the 6-digit code sent to your email
                </p>

                <div class="code-inputs d-flex justify-content-center gap-2 mb-3">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                </div>

                <p id="codeError" class="error"></p>

                <button class="btn btn-custom w-100">Verify Code</button>
            </div>

            <div class="step-divider"></div>

            <!-- STEP 3: NEW PASSWORD -->
            <div id="step3" class="hidden mt-3">
                <input type="password" id="newPassword" class="form-control mb-2" placeholder="New Password">

            <!-- PASSWORD REQUIREMENTS -->
            <p id="passwordRequirements" class="requirements mt-1">
                Password must contain:
                <br>• At least 8 characters  
                <br>• One uppercase letter  
                <br>• One number  
                <br>• One special character (!@#$%^&*)
            </p>

                <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password">

                <p id="passwordError" class="error"></p>

                <button class="btn btn-custom w-100">Change Password</button>
            </div>
        </form>
    </div>

    <!-- FOOTER -->
    <footer class="footer w-100 d-flex justify-content-between align-items-center flex-wrap">
        <div style="font-weight: bold;">
            Rockwell Automation
        </div>
        <div style="font-size: 14px;">
            © 2026 OTMANIA. All rights reserved.
        </div>
        <div class="social-icons">
            <i class="bi bi-facebook"></i>
            <i class="bi bi-linkedin"></i>
            <i class="bi bi-twitter-x"></i>
            <i class="bi bi-youtube"></i>
        </div>
    </footer>  

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/change-password.js"></script>
</body>
</html>
