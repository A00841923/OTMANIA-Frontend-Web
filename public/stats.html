<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons (Bootstrap Icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/stats.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg top-bar container-fluid px-4">

        <!-- Logo -->
        <div class="top-bar container">
            <a href="home.html">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Rockwell_Automation_logo_%282019%29.svg/1280px-Rockwell_Automation_logo_%282019%29.svg.png">
            </a>
        </div>

        <!-- Botón -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menú -->
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

            <ul class="navbar-nav align-items-lg-center gap-lg-4">

                <li class="nav-item">
                    <a class="nav-link" href="home.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="game.html">Game</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="stats.html">Stats</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact us</a>
                </li>

                <!-- Profile -->
                <li class="nav-item dropdown">
                    <a class="nav-link profile-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-fill"></i> Profile
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="profile.html">View Profile</a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="index.html">Log out</a>
                        </li>
                    </ul>
                </li>

            </ul>

        </div>
    </nav>

    <!-- GRAFICOS -->
    <div class="main-content">
    <div class="container py-5">

        <!-- TITLE -->
        <h2 id="dashboardTitle" style=" margin-bottom: 40px; color: #CD163F;">Dashboard</h2>

        <!-- STATS CARDS -->
        <div class="row g-4 mb-5" id="statCards">

    <!-- CARD 1 -->
    <div class="col-md-3 fade-in">
        <div class="stat-card text-center">
            <i class="bi bi-trophy-fill"></i>
            <h5 id="card1-title">Users</h5>
            <h3 id="card1-value">24</h3>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="col-md-3 fade-in-delay">
        <div class="stat-card text-center">
            <i class="bi bi-controller"></i>
            <h5 id="card2-title">Games Played</h5>
            <h3 id="card2-value">132</h3>
        </div>
    </div>

    <!-- CARD 3 -->
    <div class="col-md-3 fade-in-delay2">
        <div class="stat-card text-center">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <h5 id="card3-title">Avg Time</h5>
            <h3 id="card3-value">18 min</h3>
        </div>
    </div>

    <!-- CARD 4 -->
    <div class="col-md-3 fade-in-delay2">
        <div class="stat-card text-center">
            <i class="bi bi-graph-up"></i>
            <h5 id="card4-title">Performance</h5>
            <h3 id="card4-value">79%</h3>
        </div>
    </div>
        </div>

    <!-- CHARTS -->
        <div class="row g-4">

            <!-- BAR CHART -->
            <div class="col-lg-8 fade-in">
                <div class="chart-box">
                    <h5 class="mb-3">Performance by Game</h5>
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <!-- PIE CHART -->
            <div class="col-lg-4 fade-in-delay">
                <div class="chart-box text-center">
                    <h5 class="mb-3">Task Outcomes</h5>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer w-100 d-flex justify-content-between align-items-center flex-wrap">
        <div style="font-weight: bold;">
            Rockwell Automation
        </div>
        <div style="font-size: 14px;">
            © 2026 OTMANIA. All rights reserved.
        </div>
        <div class="social-icons">
            <i class="bi bi-facebook"></i>
            <i class="bi bi-linkedin"></i>
            <i class="bi bi-twitter-x"></i>
            <i class="bi bi-youtube"></i>
        </div>
    </footer>  

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/stats.js"></script>
</body>
</html>
