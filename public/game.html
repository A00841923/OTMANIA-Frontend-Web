<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTMania - Game</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons (Bootstrap Icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        @font-face {
            font-family: '8-bit';
            src: url('fonts/8-bit.TTF') format('truetype');
        }

        body {
            background-color: white;
            font-family: '8-bit', sans-serif;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .logo {
            width: 100%;
            max-width: 200px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .subtitle {
            text-align: center;
            margin-top: 50px;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: black;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #CD163F;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-section {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-screen {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9; /* mantiene proporción */

            background-color: black;
            margin: auto;
            border: 3px solid #F58025;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            position: relative;
        }

        .btn-fullscreen {
            background-color: #CD163F;
            color: white;
            border: none;
            margin-top: 20px;
            padding: 10px 25px;
            position: absolute;
            bottom: 10px;
            right: 15px;
        }

        .fullscreen-icon {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            opacity: 0.8;
        }

        .fullscreen-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .social-icons i {
            font-size: 24px;
            margin-left: 15px;
            cursor: pointer;
        }

    </style>
</head>

<body>

    <!-- Top -->
    <div class="top-bar container">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Rockwell_Automation_logo_%282019%29.svg/1280px-Rockwell_Automation_logo_%282019%29.svg.png">
        
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="game.html">Game</a>
            <a href="stats.html">Stats</a>
            <a href="contact.html">Contact us</a>
        </div>

        <!-- Icono usuario -->
        <i class="bi bi-person-fill" style="font-size: 28px;"></i>
    </div>

    <!--- Game --->
    <div class="game-section">

        <!-- Container with fullscreen button -->
        <div class="game-screen" id="gameScreen">
            Juego Unity
            <i class="bi bi-arrows-fullscreen fullscreen-icon" onclick="goFullScreen()"></i>
        </div>

    </div>

    <script>
        function goFullScreen() {
            const game = document.getElementById("gameScreen");

            if (game.requestFullscreen) {
                game.requestFullscreen();
            } else if (game.webkitRequestFullscreen) {
                game.webkitRequestFullscreen();
            }
        }
    </script>
    

</body>
</html>
