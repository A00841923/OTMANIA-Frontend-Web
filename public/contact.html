<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTMania - Contact us</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons (Bootstrap Icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        @font-face {
            font-family: '8-bit';
            src: url('fonts/8-bit.TTF') format('truetype');
        }

        body {
            background-color: white;
            font-family: '8-bit', sans-serif;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-section {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
        }

        .logo {
            width: 100%;
            max-width: 200px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: black;
        }

        .nav-links a:hover {
            color: #CD163F;
        }

        .question {
            font-size: 18px;
            text-align: center;
        }

        .btn-contact {
            background-color: #B32017;
            color: white;
            padding: 20px 40px;
            border: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-contact:hover {
            background-color: #8f1a13;
            transform: scale(1.08);
        }

        .footer {
            padding: 20px;
        }

        .social-icons i {
            font-size: 24px;
            margin-left: 15px;
            cursor: pointer;
            transition: 0.3s;

        }

        .social-icons i:hover {
            transform: scale(1.2);
            color: #CD163F;
        }

    </style>
</head>

<body>

    <!-- Top -->
    <div class="top-bar container">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Rockwell_Automation_logo_%282019%29.svg/1280px-Rockwell_Automation_logo_%282019%29.svg.png">
        
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="game.html">Game</a>
            <a href="stats.html">Stats</a>
            <a href="contact.html">Contact us</a>
        </div>

        <!-- Icono usuario -->
        <i class="bi bi-person-fill" style="font-size: 28px;"></i>
    </div>

    <!-- CONTENIDO CENTRAL -->
    <div class="container main-section">
        <div class="row w-100 align-items-center">
            
            <!-- Texto -->
            <div class="col-md-6 text-center">
                <p class="question">
                    Would you like to implement this<br>
                    experience in your company?
                </p>
            </div>

            <!-- Botón -->
            <div class="col-md-6 text-center">
                <button class="btn-contact" onclick="window.open('https://www.rockwellautomation.com/en-us.html', '_blank');">
                    Contact Rockwell
                </button>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer d-flex justify-content-between align-items-center">
        
        <!-- Texto -->
        <div style="color:#CD163F;">
            Rockwell Automations
        </div>

        <!-- Redes -->
        <div class="social-icons">
            <i class="bi bi-facebook" onclick="window.open('https://www.facebook.com/ROKAutomation', '_blank');"></i>
            <i class="bi bi-linkedin" onclick="window.open('https://www.linkedin.com/company/rockwell-automation', '_blank');"></i>
            <i class="bi bi-twitter-x" onclick="window.open('http://twitter.com/ROKAutomation', '_blank');"></i>
            <i class="bi bi-youtube" onclick="window.open('http://www.youtube.com/ROKAutomation', '_blank');"></i>
        </div>

        </div>
</body>
</html>
