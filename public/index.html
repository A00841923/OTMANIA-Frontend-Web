<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTMania - Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: '8-bit';
            src: url('fonts/8-bit.TTF') format('truetype');
        }

        body {
        background-color: white;
        font-family: '8-bit', sans-serif;

        min-height: 100vh;
        display: flex;
        flex-direction: column;
        }

        .logo {
        width: 100%;
        max-width: 200px;
        }

        .login-box {
        border: 4px solid #F58025;
        padding: 30px;
        background: white;
        }

        .form-control {
        background-color:#CD163F;
        color: white;
        border: none;
        height: 50px;
        font-size: 16px;
        }

        .form-control::placeholder {
        color: #f0f0f0;
        }

        .form-control:focus {
        background-color: #CD163F;
        color: white;
        }

        .btn-custom {
        background-color:#F58025;
        color: white;
        font-weight: bold;
        padding: 10px 30px;
        }

        .btn-custom:hover {
        background-color:#F58025;
        }

        .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        }

        .subtitle {
            text-align: center;
            margin-top: 20px;
        }

        .nav-links a {
        margin-left: 20px;
        text-decoration: none;
        color: black;
        font-weight: 500;
        }

        .nav-links a:hover {
            color: #CD163F;
        }

        .main-content {
            flex-grow: 1;
        }
        
    </style>
</head>

<body>

    <!-- Top -->
    <div class="top-bar container">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Rockwell_Automation_logo_%282019%29.svg/1280px-Rockwell_Automation_logo_%282019%29.svg.png">
    </div>

    <!-- Title -->
    <div class="subtitle">
        <h4>Welcome to OTMANIA</h4>
        <p>by Rockwell Automation</p>
    </div>

    <!-- Login -->
    <div class="main-content container d-flex justify-content-center align-items-center">
    <div class="col-11 col-sm-8 col-md-6 login-box text-center">

        <h5 class="mb-4">Login</h5>

        <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email">
            </div>

            <div class="mb-2">
                <input type="password" class="form-control" placeholder="Password">
            </div>

            <div class="text-end mb-3">
                <small>Forgot your password?</small>
            </div>

            <button class="btn btn-custom">Submit</button>
        </form>

    </div>
</div>

    <!-- Bottom -->
    <div class="text-center mt-4">
        <p>Don't have an account? <span style="color:#CD163F;">Sign in</span></p>
    </div>

</body>
</html>
